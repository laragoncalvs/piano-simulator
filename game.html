<!DOCTYPE html>
<html lang="pt-br">


<head>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">


  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      display: flex;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #0B0912;
      overflow: hidden;
    }

    /* Menu de controles no topo */
    #gameMenu {
      position: fixed;
      top: 50px;
      right: 20px;
      z-index: 2000;
      display: none;
      flex-direction: row;
      gap: 5px;
    }

    /* Pontuação no canto superior esquerdo */
    #pontuacao {
      position: fixed;
      top: 100px;
      left: 40px;
      z-index: 1500;
      display: none;
      color: white;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.8rem;
      margin: 0 0 10px 0;
      padding: 5px;
      border-radius: 8px;
    }
     #pontuacaoTitle {
      position: fixed;
      top: 55px;
      left: 30px;
      z-index: 1500;
      color: white;
      background-color:rgba(82, 82, 82);
      font-family: 'Press Start 2P', monospace;
      font-size: 0.6rem;
      padding: 5px;
      border-radius: 8px;
    }

    /* Nome da música no topo centro */
    #nomeDaMusica {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1500;
      display: none;
      color: #09179b !important;
      font-family: 'Press Start 2P', monospace;
      font-size: 0.8rem;
      margin: 0;
      padding: 10px 15px;
         text-shadow:
        -1px -1px 0 #F5873F,
        1px -1px 0 #F5873F,
        -1px 1px 0 #B03A74,
        1px 1px 0 #B03A74;
      background-color: rgba(0, 0, 0, 0.5);
      border-radius: 8px;
    }

    /* Container de botões abaixo do nome da música */
    #botoesMusica {
      position: fixed;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1500;
      display: none;
      flex-direction: row;
      gap: 15px;
      align-items: center;
      justify-content: center;
    }

    #botoesMusica button {
      padding: 8px 20px;
      color: #ffffff;
      border-radius: 18px;
      cursor: pointer;
      transition: background-color 0.3s, color 0.3s;
      font-size: 0.6rem;
      font-weight: 400;
      border: none;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      font-family: 'Press Start 2P', monospace;
      background-color: rgb(0, 0, 0);
    }

    #botoesMusica button:hover {
      opacity: 0.8;
    }

    #botoesMusica button.ativo {
      background-color: transparent !important;
      border: 2px solid #64fedd !important;
      color: #64fedd !important;
      font-weight: bold !important;
    }

    /* Progress bar de pontuação */
    #pontuacaoContainer {
      position: fixed;
      top: 80px;
      left: 20px;
      width: 200px;
      height: 12px;
      background: #202020;
      border-radius: 50px;
      overflow: hidden;
      display: none;
      z-index: 1500;
      margin: 0;
      border: 3px  solid rgba(82, 82, 82);
    }

    #estrela, #estrela2 {
      position: fixed;
      width: 1px;
      height: 18px;
      background-color: #ffffff;
      pointer-events: none;
      z-index: 22201;
    }
    #estrela{
      left: 160px
    }
     #estrela2{
      left: 190px
    }

    #pontuacaoBar {
      height: 100%;
      background: linear-gradient(90deg, #64fedd, #00d4ff);
      border-radius: 50px;
      box-shadow: 0px 0px 5px 5px rgba(48, 228, 204, 0.5);
      width: 0%;
      transition: width 0.2s ease;
    }

    /* Progress bar no canto superior direito */
    #progressContainer {
      position: fixed;
      top: 80px;
      right: 20px;
      width: 300px;
      height: 12px;
      background: #202020;
      border-radius: 50px;
      overflow: hidden;
      display: none;
      flex-direction: row;
      z-index: 1500;
      margin: 0;
      border: 3px  solid rgba(82, 82, 82);

    }

    #progressBar {
      height: 100%;
      background: #64fedd;
      border-radius: 50px;
      box-shadow: 0px 0px 5px 5px rgba(48, 228, 204, 0.5);
      width: 0%;
      transition: width 0.2s ease;
    }

    #resetarButton,
    #voltarButton {
      padding: 10px 20px;
      color: #ffffff;
      border-radius: 18px;
      cursor: pointer;
      transition: background-color 0.3s, color 0.3s;
      font-size: 0.7em;
      font-weight: 400;
      border: none;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      font-family: 'Press Start 2P', monospace;
    }

    #resetarButton {
      background-color: rgb(0, 0, 0, 0.3);
    }

    #voltarButton {
      background-color: rgb(0, 0, 0, 0.3);
    }

    #resetarButton:hover,
    #voltarButton:hover {
      opacity: 0.8;
    }

    #fimDaCena {
      color: white;
      display: none;
      margin-top: 40vh;
    }

    #fimDaCena h2 {
      font-size: 2em;
    }

    #fimDaCena button {
      padding: 12px 40px;
      color: #0e0e0e;
      border-radius: 18px;
      cursor: pointer;
      transition: background-color 0.3s, color 0.3s;
      font-size: 0.8em;
      font-weight: 400;
      border: none;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      font-family: 'Press Start 2P', monospace;
      background: linear-gradient(0deg, rgba(245, 135, 63, 1) 50%, rgba(176, 58, 116, 1) 100%);
      margin: 10px;
    }

    #fimDaCena button:hover {
      background-color: #555;
      color: white;
    }

    /* Animação de pontos flutuantes */
    .floating-points {
      position: fixed;
      font-family: 'Press Start 2P', monospace;
      font-size: 1.2rem;
      font-weight: bold;
      pointer-events: none;
      z-index: 2001;
      opacity: 1;
      animation: floatPoints 2s ease-out forwards;
    }

    .floating-points.positive {
      color: #64fedd;
      text-shadow: 0 0 10px rgba(100, 254, 221, 0.8);
    }

    .floating-points.negative {
      color: #ff4444;
      text-shadow: 0 0 10px rgba(255, 68, 68, 0.8);
    }

    @keyframes floatPoints {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
      50% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateY(-80px) scale(0.8);
      }
    }
  </style>
  <script>
    // Iniciar o jogo automaticamente ao carregar
    document.addEventListener("DOMContentLoaded", () => {
      const modoArmazenado = localStorage.getItem("modo") || "autoplay";
      const autoplayButton = document.getElementById("autoplayButton");
      const jogarButton = document.getElementById("jogarButton");
      
      // Pequeno delay para garantir que o script principal foi carregado
      setTimeout(() => {
        if (modoArmazenado === "autoplay") {
          autoplayButton.click();
        } else {
          jogarButton.click();
        }
      }, 100);
    });
  </script>


</head>


<body>
  <!-- Menu de controles durante o jogo -->
  <div id="gameMenu">
    <button id="resetarButton">Resetar</button>
    <button id="voltarButton">Voltar</button>
  </div>

  <!-- Botões escondidos para inicialização -->
  <button id="jogarButton" style="display: none;"></button>
  <button id="autoplayButton" style="display: none;"></button>

  <!-- Pontuação no canto superior esquerdo -->
  <h2 id="pontuacaoTitle">Pontuação</h2>
  <h2 id="pontuacao">0</h2>

  <!-- Nome da música no topo -->
  <h2 id="nomeDaMusica">Nome da Música</h2>

  <!-- Botões JOGAR e AUTOPLAY abaixo do nome -->
  <div id="botoesMusica">
    <button id="botoesJogar" onclick="document.getElementById('jogarButton').click()">Jogar</button>
    <button id="botoesAutoplay" onclick="document.getElementById('autoplayButton').click()">AutoPlay</button>
  </div>

  <!-- Progress bar de pontuação -->
  <div id="pontuacaoContainer">
    <div>
      <div id="estrela"></div>
      <img src="./assets/estrela.svg" style="width: 15px; position: fixed; left: 153px; top: 98px;">
    </div>
    <div>
      <div id="estrela2"></div>
      <img src="./assets/estrela.svg" style="width: 15px; position: fixed; left: 183px; top: 98px;">
    </div>
    <div id="pontuacaoBar"></div>
  </div>

  <!-- Progress bar no canto superior direito -->
  <div id="progressContainer">
    <div id="progressBar"></div>
  </div>


  <div id="fimDaCena">A música chegou ao fim 🎵 <h2> Mas você pode continuar tocando! </h2>


    <button id="jogarButton" onclick="window.location.href='game.html'">JOGAR NOVAMENTE</button>
    <button id="autoplayButton" onclick="window.location.href='selector.html'">VOLTAR</button>
  </div>






  <script type="module" src="/src/main.js">
  </script>
</body>


</html>
