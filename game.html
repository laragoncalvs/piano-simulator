<!DOCTYPE html>
<html lang="pt-br">


<head>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">


  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      display: flex;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #0B0912;
      overflow: hidden;
    }

    /* Menu de controles no topo */
    #gameMenu {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 2000;
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    /* Pontuação no canto superior esquerdo */
    #pontuacao {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 1500;
      display: none;
      color: white;
      font-family: 'Press Start 2P', monospace;
      font-size: 1rem;
      margin: 0 0 10px 0;
      padding: 10px 15px;
      background-color: rgba(0, 0, 0, 0.5);
      border-radius: 8px;
    }

    /* Progress bar de pontuação */
    #pontuacaoContainer {
      position: fixed;
      top: 80px;
      left: 20px;
      width: 200px;
      height: 8px;
      background: #202020;
      border-radius: 50px;
      overflow: hidden;
      display: none;
      z-index: 1500;
      margin: 0;
      box-shadow: 0 0 10px rgba(100, 254, 221, 0.3);
    }

    #pontuacaoBar {
      height: 100%;
      background: linear-gradient(90deg, #64fedd, #00d4ff);
      border-radius: 50px;
      box-shadow: 0px 0px 5px 5px rgba(48, 228, 204, 0.5);
      width: 0%;
      transition: width 0.2s ease;
    }

    /* Progress bar no canto superior direito */
    #progressContainer {
      position: fixed;
      top: 20px;
      right: 20px;
      width: 300px;
      height: 8px;
      background: #202020;
      border-radius: 50px;
      overflow: hidden;
      display: none;
      flex-direction: row;
      z-index: 1500;
      margin: 0;
      box-shadow: 0 0 10px rgba(100, 254, 221, 0.3);
    }

    #progressBar {
      height: 100%;
      background: #64fedd;
      border-radius: 50px;
      box-shadow: 0px 0px 5px 5px rgba(48, 228, 204, 0.5);
      width: 0%;
      transition: width 0.2s ease;
    }

    #jogarButton,
    #autoplayButton,
    #resetarButton,
    #voltarButton {
      padding: 12px 40px;
      color: #0e0e0e;
      border-radius: 18px;
      cursor: pointer;
      transition: background-color 0.3s, color 0.3s;
      font-size: 0.8em;
      font-weight: 400;
      border: none;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      font-family: 'Press Start 2P', monospace;
    }

    #resetarButton,
    #voltarButton {
      background-color: rgb(241, 132, 29);
      padding: 10px 20px;
      font-size: 0.7em;
    }

    #voltarButton {
      background-color: rgb(241, 49, 106);
    }

    #resetarButton:hover,
    #voltarButton:hover {
      opacity: 0.8;
    }

    .telaInicial {}

    .telaInicial h1 {
      font-size: 1rem;
      font-family: 'Press Start 2P', monospace;
      text-shadow:
        -1px -1px 0 #F5873F,
        1px -1px 0 #F5873F,
        -1px 1px 0 #B03A74,
        1px 1px 0 #B03A74;
      display: inline;
      margin: 0 !important;
    }

    .telaInicial span {
      font-size: 1em;
      font-family: 'Press Start 2P', monospace;
      text-shadow:
        -1px -1px 0 #F5873F,
        1px -1px 0 #F5873F,
        -1px 1px 0 #B03A74,
        1px 1px 0 #B03A74;
    }

    #telaInicial {
      margin-top: 5vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: rgba(0, 0, 0, 0.3);
      padding: 50px;
      border-radius: 20px;
      width: 60%;
    }

    #jogarButton {
      background: linear-gradient(0deg, rgba(245, 135, 63, 1) 50%, rgba(176, 58, 116, 1) 100%);
    }

    #autoplayButton {
      background: linear-gradient(0deg, rgba(245, 135, 63, 1) 50%, rgba(176, 58, 116, 1) 100%);
    }

    .container {
      width: 100vw;
    }

    #autoplayButton:hover,
    #jogarButton:hover {
      background-color: #555;
      color: white;
    }

    #elvis {
      margin-top: 15px;
    }

    .ativo {
      background-color: transparent !important;
      border: 2px solid #64fedd !important;
      color: #64fedd !important;
      font-weight: bold !important;
      margin-bottom: 12px;
    }

    .musicaEscolhida {
      background-color: transparent !important;
      color: #09179b !important;
      text-shadow: none !important;
    }

    #fimDaCena {
      color: white;
      display: none;
      margin-top: 40vh;
    }

    #fimDaCena h2 {
      font-size: 2em;
    }

    .titulo {
      font-family: 'Press Start 2P', monospace;
      font-size: 2.5rem !important;
      text-shadow: none !important;
      color: white;
    }

    #containerButton {
      display: flex;
      gap: 20px;
      z-index: 1000;
      animation: moverCimaBaixo 2s ease-in-out infinite alternate;
    }

    button {
      background-color: transparent;
      border: none;
      cursor: pointer;
    }

    h5 {
      color: #8a888b
    }

    #area {
      position: fixed;
      background-color: #09179b;
      z-index: 500;
      height: 100px;
      width: 283px;
      opacity: 0.5;
      margin-left: 349px;
      transition: margin-left 0.5s ease;
      transition: width 0.5s ease;
    }

    #pianoImg {
      margin-bottom: 30px;
      z-index: 0;
    }

    a {
      display: inline;
    }

    #buttons {
      display: flex;
      align-items: center;
      width: 100%;
      margin-top: 10px;
    }

    #elvis,
    #tchai,
    #bethoven {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #inicialButtons {
      display: flex;
      gap: 20px;
      margin-top: 10px;
    }

    #inicialButtons button {
      color: #0e0e0e;
    }
  </style>
  <script>


  </script>


</head>


<body>
  <!-- Menu de controles durante o jogo -->
  <div id="gameMenu">
    <button id="resetarButton">RESETAR</button>
    <button id="voltarButton">VOLTAR</button>
  </div>

  <!-- Pontuação no canto superior esquerdo -->
  <h2 id="pontuacao">Pontuação: 0</h2>

  <!-- Progress bar de pontuação -->
  <div id="pontuacaoContainer">
    <div id="pontuacaoBar"></div>
  </div>

  <!-- Progress bar no canto superior direito -->
  <div id="progressContainer">
    <div id="progressBar"></div>
  </div>

  <div id="telaInicial" class="telaInicial">
    <div id="titulo" style="margin-bottom: 20px;">


      <h1 class="titulo"> SELECIONE UMA MÚSICA</h1> <br>
      <h5>Depois pressione jogar ou autoplay para uma demonstração</h5>
    </div>
      <div id="buttons" id="elvis"> <button style="margin: 0px 10px;" id="elvis" class="musicaEscolhida">
          <h1>Beethoven - Für Elise
 </h1> <span>Fácil</span>
        </button> <a id="playElvis"
          href="https://www.youtube.com/watch?v=wfF0zHeU3Zs"
          target="_blank"><img style="width: 20px;" src="./assets/play.png"></a> </div>
      <div id="buttons"> <button style="margin: 0px 10px;" id="bethoven">
          <h1>Bethoven - Ode á Alegria </h1><span>Médio</span>
        </button> <a id="playBethoven"
          href="https://www.youtube.com/watch?v=yIi72FRnZp8&pp=ygUNb2RlIGEgYWxlZ3JpYQ%3D%3D" target="_blank"><img
            style="width: 20px;" src="./assets/play.png"></a> </div>
      <div id="buttons"> <button style="margin:  0px 10px;" id="tchai">
          <h1>Tchaikovsky - Lago dos Cisnes </h1><span>Díficil</span>
        </button> <a id="playTchai" href="https://www.youtube.com/watch?v=YYWxcFVv_oM" target="_blank"><img
            style="width: 20px;" src="./assets/play.png"></a> </div>


    <div id="pianoImg">
      <h5>Área do piano que vai ser tocada:</h5>
      <div id="area"></div>
      <img src="./assets/piano-completo-test.png" />
    </div>
    <div id="inicialButtons">
      <button id="jogarButton">JOGAR</button>
      <button id="autoplayButton">AUTOPLAY</button>
    </div>
  </div>
  <div id="fimDaCena">A música chegou ao fim 🎵 <h2> Mas você pode continuar tocando! </h2>


    <button id="jogarButton" onclick="window.location.href='game.html'">JOGAR NOVAMENTE</button>
    <button id="autoplayButton" onclick="window.location.href='index.html'">VOLTAR</button>
  </div>






  <script type="module" src="/src/main.js">
  </script>
</body>


</html>
