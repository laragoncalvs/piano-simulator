<!DOCTYPE html>
<html lang="pt-br">


<head>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">


  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      display: flex;
      font-family: Arial, sans-serif;
      text-align: center;
      margin: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #0B0912;
      overflow-x: hidden;
    }

    .telaInicial {}

    .telaInicial h1 {
      font-size: 1rem;
      font-family: 'Press Start 2P', monospace;
      text-shadow:
        -1px -1px 0 #F5873F,
        1px -1px 0 #F5873F,
        -1px 1px 0 #B03A74,
        1px 1px 0 #B03A74;
      display: inline;
      margin: 0 !important;
    }

    .telaInicial span {
      font-size: 1em;
      font-family: 'Press Start 2P', monospace;
      text-shadow:
        -1px -1px 0 #F5873F,
        1px -1px 0 #F5873F,
        -1px 1px 0 #B03A74,
        1px 1px 0 #B03A74;
    }

    #telaInicial {
      margin-top: 5vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      background-color: rgba(0, 0, 0, 0.3);
      padding: 50px;
      border-radius: 20px;
      width: 60%;
    }

    #jogarButton,
    #autoplayButton {
      padding: 12px 40px;
      color: #0e0e0e;
      border-radius: 18px;
      cursor: pointer;
      transition: background-color 0.3s, color 0.3s;
      font-size: 0.8em;
      font-weight: 400;
      border: none;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
      font-family: 'Press Start 2P', monospace;
    }

    #jogarButton {
      background: linear-gradient(0deg, rgba(245, 135, 63, 1) 50%, rgba(176, 58, 116, 1) 100%);
    }

    #autoplayButton {
      background: linear-gradient(0deg, rgba(245, 135, 63, 1) 50%, rgba(176, 58, 116, 1) 100%);
    }

    #autoplayButton:hover,
    #jogarButton:hover {
      background-color: #555;
      color: white;
    }

    #elvis {
      margin-top: 15px;
    }

    .ativo {
      background-color: transparent !important;
      border: 2px solid #64fedd !important;
      color: #64fedd !important;
      font-weight: bold !important;
      margin-bottom: 12px;
    }

    .musicaEscolhida {
      background-color: transparent !important;
      color: #09179b !important;
      text-shadow: none !important;
    }

    .titulo {
      font-family: 'Press Start 2P', monospace;
      font-size: 2.5rem !important;
      text-shadow: none !important;
      color: white;
    }

    button {
      background-color: transparent;
      border: none;
      cursor: pointer;
    }

    h5 {
      color: #8a888b
    }

    #area {
      position: fixed;
      background-color: #09179b;
      z-index: 500;
      height: 100px;
      width: 283px;
      opacity: 0.5;
      margin-left: 349px;
      transition: margin-left 0.5s ease;
      transition: width 0.5s ease;
    }

    #pianoImg {
      margin-bottom: 10px;
      z-index: 0;
    }

    a {
      display: inline;
    }

    #buttons {
      display: flex;
      align-items: center;
      width: 100%;
      margin-top: 10px;
    }

    #elvis,
    #tchai,
    #bethoven,
    #littlestar,
    #jinglebell {
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    #modoContainer {
      display: flex;
      gap: 15px;
      margin-top: 20px;
      margin-bottom: 30px;
      justify-content: center;
      width: 100%;
    }

    .botaoModo {
      padding: 5px;
      width: 200px;
      height: 70px;
      font-size: 0.9em;
      border: 3px solid rgba(255, 255, 255, 0.3);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: 'Press Start 2P', monospace;
      background-color: transparent;
      color: white;
    }

    .botaoModo,
    h5 {
      margin-bottom: 5px;
      margin-top: 0px;
    }

    .botaoModo:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(245, 135, 63, 0.5);
    }

    .botaoModo.ativo {
      color: white;
      border-color: #F5873F;
      text-shadow: none;
      box-shadow: 0 0 20px #F5873F;
    }

    #inicialButtons {
      display: flex;
      gap: 20px;
      margin-top: 10px;
    }

    #inicialButtons button {
      color: #0e0e0e;
    }

    #rankingButton {
      color: white;
      font-family: 'Press Start 2P', monospace;
      margin-top: 20px;
      margin-bottom: 20px;
      font-size: 0.6em;
      letter-spacing: 2px;
      animation: rankingPiscar 1s infinite;
      cursor: pointer;
    }

    #rankingButton:hover {
      color: #E323CA;
      animation: none;
    }

    @keyframes rankingPiscar {

      0%,
      100% {
        color: white;
      }

      50% {
        color: #E323CA;
      }
    }

    #rankingModalBox {
      background: #0B0912;
      border: 1px solid #E323CA;
      border-radius: 16px;
      width: 460px;
      max-width: 90vw;
      max-height: 80vh;
      overflow-y: auto;
      padding: 28px 28px 24px;
      color: white;
      font-family: 'Press Start 2P', monospace;
    }

    #rankingModalHeader {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    #rankingModalTitulo {
      font-size: 0.85rem;
      color: #E323CA;
    }

    #rankingFecharBtn {
      background: transparent;
      border: none;
      color: rgba(255, 255, 255, 0.5);
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 8px;
      line-height: 1;
    }

    #rankingFecharBtn:hover {
      color: white;
    }

    #rankingModalFiltros {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      gap: 12px;
    }

    #rankingModalMusica {
      font-size: 0.5rem;
      color: rgba(255, 255, 255, 0.6);
      flex: 1;
      line-height: 1.4;
    }

    #rankingModalModos {
      display: flex;
      gap: 8px;
    }

    #rankingModalModoAtual {
      font-size: 0.45rem;
      color: #E323CA;
      border: 1px solid #E323CA;
      border-radius: 20px;
      padding: 4px 12px;
      white-space: nowrap;
    }

    #rankingModalLista {
      list-style: none;
      padding: 0;
      margin: 0 0 8px;
    }

    #rankingModalLista li {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 0.5rem;
      color: rgba(255, 255, 255, 0.8);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
    }

    #rankingModalLista li:first-child {
      background: rgba(227, 35, 202, 0.12);
    }

    #rankingModalLista li:nth-child(2) {
      background: rgba(227, 35, 202, 0.07);
    }

    #rankingModalLista li:nth-child(3) {
      background: rgba(227, 35, 202, 0.04);
    }

    .rm-pos {
      min-width: 26px;
      color: #E323CA;
      font-weight: 700;
    }

    .rm-nome {
      flex: 1;
    }

    .rm-pts {
      color: #64fedd;
      min-width: 48px;
      text-align: right;
    }

    .rm-data {
      min-width: 60px;
      text-align: right;
      font-size: 0.4rem;
      opacity: 0.5;
    }

    #rankingModalVazio {
      font-size: 0.5rem;
      color: rgba(255, 255, 255, 0.3);
      text-align: center;
      margin: 20px 0 0;
      display: none;
    }
  </style>
  <script>
    let musica = null;
    let modo = "jogador"; // Modo padrão é "jogador"

    document.addEventListener("DOMContentLoaded", () => {
      // Referencias aos elementos de música
      const littlestarMusic = document.getElementById("littlestar");
      const elvisMusic = document.getElementById("elvis");
      const bethovenMusic = document.getElementById("bethoven");
      const tchaiMusic = document.getElementById("tchai");
      const jinglebellMusic = document.getElementById("jinglebell");

      const area = document.getElementById("area");

      // Referências aos botões de modo
      const botaoAprendiz = document.getElementById("botaoAprendiz");
      const botaoJogador = document.getElementById("botaoJogador");

      // Referências aos botões de ação
      const jogarButton = document.getElementById("jogarButton");
      const autoplayButton = document.getElementById("autoplayButton");

      const rankingButton = document.getElementById('rankingButton');
      const rankingModal = document.getElementById('rankingModal');
      const rankingFecharBtn = document.getElementById('rankingFecharBtn');
      const rankingModalLista = document.getElementById('rankingModalLista');
      const rankingModalVazio = document.getElementById('rankingModalVazio');
      const rankingModalMusica = document.getElementById('rankingModalMusica');
      let rankingModoAtivo = 'jogador'; // valor inicial
      const nomesMusicas = {
        "littlestar": "Twinkle, Twinkle, Little Star",
        "jinglebell": "Jingle Bells",
        "elvis": "Beethoven - Für Elise",
        "bethoven": "Bethoven - Ode á Alegria",
        "tchai": "Tchaikovsky - Lago dos Cisnes"
      };

      const JSONBIN_BIN_ID = '69f1188faaba8821974b8a2f';
      const JSONBIN_API_KEY = '$2a$10$RBwCZQy9WisM0z0MJC4cvOFKLJBE0zQtDUqHlJY.Fs.srbe6cMPWi';

      async function carregarRankingModal() {
        rankingModalLista.innerHTML = '';
        rankingModalVazio.style.display = 'none';
        rankingModalLista.style.display = 'block';
        rankingModalLista.innerHTML = '<li style="color:rgba(255,255,255,0.3);font-size:0.45rem;list-style:none;text-align:center;padding:16px 0;">Carregando...</li>';

        let lista = [];
        try {
          const res = await fetch(`https://api.jsonbin.io/v3/b/${JSONBIN_BIN_ID}/latest`, {
            headers: { 'X-Master-Key': JSONBIN_API_KEY }
          });
          const json = await res.json();
          const dados = json.record || {};
          const key = `${musica}_jogar_${modo}`;
          lista = dados[key] || [];
        } catch {
          lista = [];
        }

        rankingModalMusica.textContent = nomesMusicas[musica] || musica;
        document.getElementById('rankingModalModoAtual').textContent =
          modo === 'aprendiz' ? 'Aprendiz' : 'Jogador';

        rankingModalLista.innerHTML = '';

        if (lista.length === 0) {
          rankingModalVazio.style.display = 'block';
          rankingModalLista.style.display = 'none';
        } else {
          rankingModalVazio.style.display = 'none';
          rankingModalLista.style.display = 'block';
          lista.forEach((entry, i) => {
            const li = document.createElement('li');
            const medalha = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : `${i + 1}º`;
            li.innerHTML = `
                <span class="rm-pos">${medalha}</span>
                <span class="rm-nome">${entry.nome}</span>
                <span class="rm-pts">${entry.pontuacao}</span>
                <span class="rm-data">${entry.data}</span>
            `;
            rankingModalLista.appendChild(li);
          });
        }
      }

      rankingButton.addEventListener('click', () => {
        rankingModal.style.display = 'flex';
        carregarRankingModal().catch(console.error);
      });

      rankingFecharBtn.addEventListener('click', () => {
        rankingModal.style.display = 'none';
      });

      rankingModal.addEventListener('click', (e) => {
        if (e.target === rankingModal) rankingModal.style.display = 'none';
      });


      // Atualiza o modal sempre que a música selecionada muda — adicione esta linha
      // em cada listener de música, logo após o `musica = "..."`:
      // carregarRankingModal(); (só tem efeito se o modal estiver aberto)

      // Recuperar modo do localStorage se existir
      const modoSalvo = localStorage.getItem("modoSelecionado");
      if (modoSalvo) {
        modo = modoSalvo;
      }

      // Inicializar estado dos botões de modo
      atualizarEstadoBotoesModo();

      // Inicializar a primeira música (elvis) como selecionada
      musica = "jinglebell";
      littlestarMusic.classList.remove("musicaEscolhida");
      elvisMusic.classList.remove("musicaEscolhida");
      bethovenMusic.classList.remove("musicaEscolhida");
      tchaiMusic.classList.remove("musicaEscolhida");
      jinglebellMusic.classList.add("musicaEscolhida");

      area.style.setProperty("margin-left", "384px", "important");
      area.style.setProperty("width", "108px", "important");

      // Event listeners para seleção de modo
      botaoAprendiz.addEventListener("click", () => {
        modo = "aprendiz";
        localStorage.setItem("modoSelecionado", "aprendiz");
        atualizarEstadoBotoesModo();
            if (rankingModal.style.display === 'flex') carregarRankingModal().catch(console.error);

      });

      botaoJogador.addEventListener("click", () => {
        modo = "jogador";
        localStorage.setItem("modoSelecionado", "jogador");
        atualizarEstadoBotoesModo();
            if (rankingModal.style.display === 'flex') carregarRankingModal().catch(console.error);

      });

      // Event listeners para seleção de música
      elvisMusic.addEventListener("click", () => {
        musica = "elvis"
        bethovenMusic.classList.remove("musicaEscolhida")
        tchaiMusic.classList.remove("musicaEscolhida")
        littlestarMusic.classList.remove("musicaEscolhida")
        elvisMusic.classList.add("musicaEscolhida");
        jinglebellMusic.classList.remove("musicaEscolhida");
        area.style.setProperty("margin-left", "349px", "important");
        area.style.setProperty("width", "283px", "important");
    if (rankingModal.style.display === 'flex') carregarRankingModal().catch(console.error);

      })

      bethovenMusic.addEventListener("click", () => {
        musica = "bethoven"
        bethovenMusic.classList.add("musicaEscolhida");
        elvisMusic.classList.remove("musicaEscolhida");
        tchaiMusic.classList.remove("musicaEscolhida");
        littlestarMusic.classList.remove("musicaEscolhida");
        jinglebellMusic.classList.remove("musicaEscolhida");
        area.style.setProperty("margin-left", "306px", "important");
        area.style.setProperty("width", "218px", "important");
    if (rankingModal.style.display === 'flex') carregarRankingModal().catch(console.error);

      })

      tchaiMusic.addEventListener("click", () => {
        musica = "tchai"
        tchaiMusic.classList.add("musicaEscolhida")
        bethovenMusic.classList.remove("musicaEscolhida");
        elvisMusic.classList.remove("musicaEscolhida");
        littlestarMusic.classList.remove("musicaEscolhida");
        jinglebellMusic.classList.remove("musicaEscolhida");
        area.style.setProperty("margin-left", "140px", "important");
        area.style.setProperty("width", "582px", "important");
    if (rankingModal.style.display === 'flex') carregarRankingModal().catch(console.error);

      })

      littlestarMusic.addEventListener("click", () => {
        musica = "littlestar"
        littlestarMusic.classList.add("musicaEscolhida")
        bethovenMusic.classList.remove("musicaEscolhida");
        elvisMusic.classList.remove("musicaEscolhida");
        tchaiMusic.classList.remove("musicaEscolhida");
        jinglebellMusic.classList.remove("musicaEscolhida");
        area.style.setProperty("margin-left", "215px", "important");
        area.style.setProperty("width", "231px", "important");
    if (rankingModal.style.display === 'flex') carregarRankingModal().catch(console.error);

      })
      jinglebellMusic.addEventListener("click", () => {
        musica = "jinglebell"
        jinglebellMusic.classList.add("musicaEscolhida")
        bethovenMusic.classList.remove("musicaEscolhida");
        elvisMusic.classList.remove("musicaEscolhida");
        tchaiMusic.classList.remove("musicaEscolhida");
        littlestarMusic.classList.remove("musicaEscolhida");
        area.style.setProperty("margin-left", "384px", "important");
        area.style.setProperty("width", "108px", "important");
    if (rankingModal.style.display === 'flex') carregarRankingModal().catch(console.error);

      })


      jogarButton.addEventListener("click", () => {
        if (musica) {
          localStorage.setItem("musica", musica);
          localStorage.setItem("modo", "jogar");
          localStorage.setItem("modoMusica", modo);
          window.location.href = "game.html";
        } else {
          alert("Selecione uma música!");
        }
      });

      autoplayButton.addEventListener("click", () => {
        if (musica) {
          localStorage.setItem("musica", musica);
          localStorage.setItem("modo", "autoplay");
          localStorage.setItem("modoMusica", modo);
          window.location.href = "game.html";
        } else {
          alert("Selecione uma música!");
        }
      });

      function atualizarEstadoBotoesModo() {
        if (modo === "aprendiz") {
          botaoAprendiz.classList.add("ativo");
          botaoJogador.classList.remove("ativo");
        } else {
          botaoJogador.classList.add("ativo");
          botaoAprendiz.classList.remove("ativo");
        }
      }
    });
  </script>


</head>

<body>
  <!-- MODAL DE RANKING — agora dentro do body, estrutura corrigida -->
  <div id="rankingModal"
    style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.75); z-index:9999; align-items:center; justify-content:center;">
    <div id="rankingModalBox">
      <div id="rankingModalHeader">
        <span id="rankingModalTitulo">🏆 Ranking</span>
        <button id="rankingFecharBtn">✕</button>
      </div>
      <div id="rankingModalFiltros">
        <span id="rankingModalMusica">—</span>
        <span id="rankingModalModoAtual"></span>
      </div>
      <ol id="rankingModalLista"></ol>
      <p id="rankingModalVazio">Nenhuma pontuação ainda para essa combinação.</p>
    </div>
  </div>
  <div id="telaInicial" class="telaInicial">
    <div id="titulo" style="margin-bottom: 20px;">
      <h1 class="titulo">SELECIONE UMA MÚSICA</h1><br>
      <h5 style="margin-top: 10px;">Depois pressione jogar ou autoplay para uma demonstração</h5>

    <div id="buttons">
      <button style="margin: 0px 10px;" id="jinglebell">
        <h1>Jingle Bells - James Lord Pierpont</h1><span>Fácil</span>
      </button>
      <a id="playJingleBell" href="https://www.youtube.com/watch?v=YYWxcFVv_oM" target="_blank">
        <img style="width: 20px;" src="/piano-simulator/assets/play-D1yz_HIV.png">
      </a>
    </div>
    <div id="buttons">
      <button style="margin: 0px 10px;" id="littlestar">
        <h1>Mozart - Twinkle, Twinkle, Little Star</h1><span>Fácil</span>
      </button>
      <a id="playLittleStar" href="https://www.youtube.com/watch?v=A3tqsoFUF0w" target="_blank">
        <img style="width: 20px;" src="/piano-simulator/assets/play-D1yz_HIV.png">
      </a>
    </div>
    <div id="buttons">
      <button style="margin: 0px 10px;" id="elvis">
        <h1>Beethoven - Für Elise</h1><span>Médio</span>
      </button>
      <a id="playElvis" href="https://www.youtube.com/watch?v=wfF0zHeU3Zs" target="_blank">
        <img style="width: 20px;" src="/piano-simulator/assets/play-D1yz_HIV.png">
      </a>
    </div>
    <div id="buttons">
      <button style="margin: 0px 10px;" id="bethoven">
        <h1>Bethoven - Ode á Alegria</h1><span>Médio</span>
      </button>
      <a id="playBethoven" href="https://www.youtube.com/watch?v=yIi72FRnZp8&pp=ygUNb2RlIGEgYWxlZ3JpYQ%3D%3D"
        target="_blank">
        <img style="width: 20px;" src="/piano-simulator/assets/play-D1yz_HIV.png">
      </a>
    </div>
    <div id="buttons">
      <button style="margin: 0px 10px;" id="tchai">
        <h1>Tchaikovsky - Lago dos Cisnes</h1><span>Díficil</span>
      </button>
      <a id="playTchai" href="https://www.youtube.com/watch?v=YYWxcFVv_oM" target="_blank">
        <img style="width: 20px;" src="/piano-simulator/assets/play-D1yz_HIV.png">
      </a>
    </div>

    <h5 style="margin-top: 10px;">Agora escolha um modo de jogo</h5>
    <div id="modoContainer">
      <button id="botaoAprendiz" class="botaoModo">
        <h5 style="color: inherit;">APRENDIZ</h5>
        <small style="font-size: 0.6em;">para treinar!</small>
      </button>
      <button id="botaoJogador" class="botaoModo">
        <h5 style="color: inherit;">JOGADOR</h5>
        <small style="font-size: 0.6em;">velocidade original!</small>
      </button>
    </div>

    <div id="pianoImg">
